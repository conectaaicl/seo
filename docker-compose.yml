version: '3.8'

services:
  seo_api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: seo_api
    restart: unless-stopped
    ports:
      - "8009:8000"
    env_file:
      - ./backend/.env
    volumes:
      - seo_db:/app/data
    networks:
      - seo_net

volumes:
  seo_db:

networks:
  seo_net:
    driver: bridge
